spring.application.name=MiniInventario

#Configuraci\u00f3n MySQL
server.port=8085
#spring.datasource.username=root
#spring.datasource.password=root
#spring.datasource.url=jdbc:mysql://localhost:3306/miniinventario
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.profiles.active=dev

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

springdoc.api-docs.enabled = true
springdoc.swagger-ui.enabled = true
springdoc.swagger-ui.path = /documentacion/swagger-ui.html
springdoc.paths-to-match = /api/v1/categorias/**, /api/v1/productos/**





